<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>働きがい診断</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --font: 'BIZ UDPGothic', sans-serif;
  --bg: #F8F7F4;
  --surface: #FFFFFF;
  --text: #1A1A18;
  --text-sub: #6B6B68;
  --border: #E5E2DC;
  --radius: 16px;

  --type-a-dark: #E8502A;
  --type-a-mid:  #F4845F;
  --type-a-light:#FBCFBF;

  --type-b-dark: #E8A020;
  --type-b-mid:  #F5C96A;
  --type-b-light:#FFF0C2;

  --type-c-dark: #3A8C28;
  --type-c-mid:  #80C46E;
  --type-c-light:#D0EDCA;

  --type-d-dark: #5C3A78;
  --type-d-mid:  #A882C0;
  --type-d-light:#E8D8F4;

  --type-e-dark: #1A88CC;
  --type-e-mid:  #72C4E8;
  --type-e-light:#C8EDFB;

  --type-f-dark: #3A3530;
  --type-f-mid:  #C8A86A;
  --type-f-light:#EDE0CC;
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ========== 氏名入力画面 ========== */
#nameScreen {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 24px;
}

.name-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 48px 40px;
  max-width: 420px;
  width: 100%;
  box-shadow: 0 2px 24px rgba(0,0,0,0.06);
  text-align: center;
}

.name-card .logo {
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.2em;
  color: var(--text-sub);
  margin-bottom: 32px;
}

.name-card h1 {
  font-size: 26px;
  font-weight: 700;
  margin-bottom: 8px;
  line-height: 1.4;
}

.name-card p {
  font-size: 15px;
  color: var(--text-sub);
  line-height: 1.8;
  margin-bottom: 32px;
}

.name-input-wrap {
  position: relative;
  margin-bottom: 16px;
}

.name-input-wrap input {
  width: 100%;
  padding: 14px 18px;
  font-family: var(--font);
  font-size: 16px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  background: var(--bg);
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
}

.name-input-wrap input:focus {
  border-color: #888;
}

.name-btn {
  width: 100%;
  padding: 14px;
  font-family: var(--font);
  font-size: 15px;
  font-weight: 700;
  background: var(--text);
  color: #fff;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  transition: opacity 0.2s;
  letter-spacing: 0.05em;
}

.name-btn:hover { opacity: 0.8; }

.name-error {
  display: none;
  font-size: 13px;
  color: #C0392B;
  margin-top: 12px;
}

/* ========== ローディング ========== */
#loading {
  display: none;
  position: fixed;
  inset: 0;
  background: var(--bg);
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 16px;
  z-index: 100;
}

.spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--border);
  border-top-color: #888;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ========== 結果画面 ========== */
#resultScreen { display: none; }

.result-header {
  padding: 48px 24px 40px;
  text-align: center;
  position: relative;
}

.result-header .label {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.2em;
  opacity: 0.6;
  margin-bottom: 20px;
}

.result-top {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 24px;
  flex-wrap: wrap;
}

.type-icon-wrap {
  flex-shrink: 0;
}

.type-title-wrap {
  text-align: left;
}

.anata-wa {
  font-size: 16px;
  opacity: 0.7;
  margin-bottom: 4px;
}

.type-name-large {
  font-size: clamp(30px, 7vw, 44px);
  font-weight: 700;
  line-height: 1.2;
  margin-bottom: 8px;
}

.type-badge {
  display: inline-block;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.12em;
  padding: 5px 16px;
  border-radius: 100px;
  opacity: 0.85;
}

.desc-card {
  max-width: 640px;
  margin: 32px auto 0;
  background: rgba(255,255,255,0.6);
  border-radius: 12px;
  padding: 24px 28px;
  font-size: 16px;
  line-height: 1.9;
  text-align: left;
}

/* ========== レーダーチャートセクション ========== */
.chart-section {
  max-width: 680px;
  margin: 0 auto;
  padding: 0 24px 64px;
}

.section-label {
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.18em;
  color: var(--text-sub);
  margin-bottom: 24px;
  text-align: center;
}

.chart-wrap {
  max-width: 520px;
  margin: 0 auto;
}

/* ========== タイプ別カラー ========== */
/* 共通：背景は淡い色、テキストは暗色 */
.type-A .result-header { background: var(--type-a-light); }
.type-A .label { color: var(--type-a-dark); }
.type-A .anata-wa { color: var(--type-a-dark); opacity: 0.8; }
.type-A .type-name-large { color: var(--type-a-dark); }
.type-A .type-badge { background: var(--type-a-dark); color: #fff; }
.type-A .desc-card { border-left: 4px solid var(--type-a-dark); background: rgba(255,255,255,0.75); }

.type-B .result-header { background: var(--type-b-light); }
.type-B .label { color: var(--type-b-dark); }
.type-B .anata-wa { color: var(--type-b-dark); opacity: 0.8; }
.type-B .type-name-large { color: var(--type-b-dark); }
.type-B .type-badge { background: var(--type-b-dark); color: #fff; }
.type-B .desc-card { border-left: 4px solid var(--type-b-dark); background: rgba(255,255,255,0.75); }

.type-C .result-header { background: var(--type-c-light); }
.type-C .label { color: var(--type-c-dark); }
.type-C .anata-wa { color: var(--type-c-dark); opacity: 0.8; }
.type-C .type-name-large { color: var(--type-c-dark); }
.type-C .type-badge { background: var(--type-c-dark); color: #fff; }
.type-C .desc-card { border-left: 4px solid var(--type-c-dark); background: rgba(255,255,255,0.75); }

.type-D .result-header { background: var(--type-d-light); }
.type-D .label { color: var(--type-d-dark); }
.type-D .anata-wa { color: var(--type-d-dark); opacity: 0.8; }
.type-D .type-name-large { color: var(--type-d-dark); }
.type-D .type-badge { background: var(--type-d-dark); color: #fff; }
.type-D .desc-card { border-left: 4px solid var(--type-d-dark); background: rgba(255,255,255,0.75); }

.type-E .result-header { background: var(--type-e-light); }
.type-E .label { color: var(--type-e-dark); }
.type-E .anata-wa { color: var(--type-e-dark); opacity: 0.8; }
.type-E .type-name-large { color: var(--type-e-dark); }
.type-E .type-badge { background: var(--type-e-dark); color: #fff; }
.type-E .desc-card { border-left: 4px solid var(--type-e-dark); background: rgba(255,255,255,0.75); }

.type-F .result-header { background: var(--type-f-light); }
.type-F .label { color: var(--type-f-dark); }
.type-F .anata-wa { color: var(--type-f-dark); opacity: 0.8; }
.type-F .type-name-large { color: var(--type-f-dark); }
.type-F .type-badge { background: var(--type-f-dark); color: var(--type-f-light); }
.type-F .desc-card { border-left: 4px solid var(--type-f-mid); background: rgba(255,255,255,0.75); }

/* ========== SVGアイコン ========== */
.type-icon { width: 96px; height: 96px; }

@media (max-width: 480px) {
  .name-card { padding: 36px 24px; }
  .result-top { flex-direction: column; gap: 16px; }
  .type-title-wrap { text-align: center; }
  .type-icon { width: 80px; height: 80px; }
}
</style>
</head>
<body>

<!-- 氏名入力画面 -->
<div id="nameScreen">
  <div class="name-card">
    <div class="logo">働きがい診断</div>
    <h1>あなたの氏名を<br>入力してください</h1>
    <p>フォームに回答したときと<br>同じ氏名を入力してください。</p>
    <div class="name-input-wrap">
      <input type="text" id="nameInput" placeholder="例：山田 太郎" />
    </div>
    <button class="name-btn" onclick="fetchResult()">結果を見る</button>
    <div class="name-error" id="nameError"></div>
  </div>
</div>

<!-- ローディング -->
<div id="loading" style="display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;">
  <div class="spinner"></div>
  <p style="font-size:13px;color:var(--text-sub);">診断結果を取得しています…</p>
</div>

<!-- 結果画面 -->
<div id="resultScreen">
  <div class="result-header" id="resultHeader">
    <div class="label">HATARAKI-GAI DIAGNOSIS</div>
    <div class="result-top">
      <div class="type-icon-wrap">
        <svg class="type-icon" id="typeIcon" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg"></svg>
      </div>
      <div class="type-title-wrap">
        <div class="anata-wa">あなたは…</div>
        <div class="type-name-large" id="typeName"></div>
        <div class="type-badge" id="typeBadge"></div>
      </div>
    </div>
    <div class="desc-card" id="typeDesc"></div>
  </div>

  <div class="chart-section">
    <div class="section-label">要素別スコア</div>
    <div class="chart-wrap">
      <canvas id="radarChart"></canvas>
    </div>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyx-a3InQsD2sMq5RFbNGNQfSww6DS_LE2-iOSYjK2uwrrJkQuCiw41xJAPTBg1WPbAgw/exec';

const ELEMENT_ORDER = [

const QUESTION_MAP = {
  'Q7㉔私は福祉業界で働いていることを誇りに思う': '業界への誇り',
  'Q7⑦私の職場には、信頼できる上司や同僚がいる': '良好な人間関係',

    colorDark: '#E8502A', colorMid: '#F4845F', colorLight: '#FBCFBF',

    icon: (c) => `

      <path d="M34 58c0-7.7 6.3-14 14-14s14 6.3 14 14v10H34V58z" fill="${c.light}" stroke="${c.dark}" stroke-width="2.5"/>

      <circle cx="48" cy="28" r="14" fill="${c.light}" stroke="${c.dark}" stroke-width="2.5"/>

const TYPE_CHART_COLORS = {

function calcScores(row) {
  const buckets = {};
  ELEMENT_ORDER.forEach(e => { buckets[e] = { sum: 0, count: 0 }; });
  Object.entries(QUESTION_MAP).forEach(([q, element]) => {
    const key = Object.keys(row).find(k => k.trim() === q.trim());
    if (key !== undefined && row[key] !== null && row[key] !== '') {
      const val = Number(row[key]);
      if (!isNaN(val)) {
        buckets[element].sum += val;
        buckets[element].count += 1;
      }
    }
  });
  const scores = {};
  ELEMENT_ORDER.forEach(e => {
    const b = buckets[e];
    scores[e] = b.count > 0 ? Math.round((b.sum / b.count) * 100) / 100 : 0;
  });
  return scores;
}

function determineType(scores) {
  const avg = ELEMENT_ORDER.reduce((s, k) => s + scores[k], 0) / ELEMENT_ORDER.length;
  const ranked = [...ELEMENT_ORDER].sort((a, b) => scores[b] - scores[a]);
  const top1 = ranked[0];
  const top2 = ranked[1];
  const 制度報酬 = scores['制度・報酬'];
  if (avg >= 3.2) return 'A';
  if (avg >= 2.8) return 制度報酬 >= 2.5 ? 'C' : 'B';
  if (
    (top1 === 'スキル獲得' || top1 === '成長実感・能力発揮') &&
    (top2 === 'スキル獲得' || top2 === '成長実感・能力発揮')
  ) return 'D';
  if (
    (top1 === '役割・目標明瞭性' || top2 === '役割・目標明瞭性') &&
    (top1 === 'スキル獲得' || top2 === 'スキル獲得')
  ) return 'E';
  if (top1 === '役割・目標明瞭性') return 'E';
  return 'F';
}

function render(scores, typeKey) {
  const type = TYPES[typeKey];
  const screen = document.getElementById('resultScreen');
  screen.className = 'type-' + typeKey;

  document.getElementById('typeName').textContent = type.name;
  document.getElementById('typeBadge').textContent = type.badge;
  document.getElementById('typeDesc').textContent = type.desc;

  const c = { dark: type.colorDark, mid: type.colorMid, light: type.colorLight };
  document.getElementById('typeIcon').innerHTML = type.icon(c);

  const chartColors = TYPE_CHART_COLORS[typeKey];
  new Chart(document.getElementById('radarChart'), {
    type: 'radar',
    data: {
      labels: ELEMENT_ORDER,
      datasets: [{
        data: ELEMENT_ORDER.map(e => scores[e]),
        backgroundColor: chartColors.bg,
        borderColor: chartColors.border,
        borderWidth: 2.5,
        pointBackgroundColor: chartColors.border,
        pointRadius: 4,
        pointHoverRadius: 6,
      }],
    },
    options: {
      scales: {
        r: {
          min: 1, max: 4,
          ticks: { stepSize: 1, font: { size: 12, family: "'BIZ UDPGothic', sans-serif" }, backdropColor: 'transparent' },
          pointLabels: { font: { size: 14, family: "'BIZ UDPGothic', sans-serif" } },
          grid: { color: 'rgba(0,0,0,0.08)' },
          angleLines: { color: 'rgba(0,0,0,0.08)' },
        },
      },
      plugins: { legend: { display: false } },
    },
  });
}

async function fetchResult() {
  const name = document.getElementById('nameInput').value.trim();
  const errEl = document.getElementById('nameError');
  errEl.style.display = 'none';

  if (!name) {
    errEl.textContent = '氏名を入力してください。';
    errEl.style.display = 'block';
    return;
  }

  document.getElementById('nameScreen').style.display = 'none';
  document.getElementById('loading').style.display = 'flex';

  try {
    const res = await fetch(GAS_URL + '?name=' + encodeURIComponent(name));
    const data = await res.json();

    if (data.error) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('nameScreen').style.display = 'flex';
      errEl.textContent = data.error === '該当する回答が見つかりませんでした'
        ? '回答が見つかりませんでした。フォームと同じ氏名を入力してください。'
        : data.error;
      errEl.style.display = 'block';
      return;
    }

    const scores = calcScores(data);
    const typeKey = determineType(scores);

    document.getElementById('loading').style.display = 'none';
    document.getElementById('resultScreen').style.display = 'block';
    render(scores, typeKey);

  } catch (e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('nameScreen').style.display = 'flex';
    errEl.textContent = 'データの取得に失敗しました。時間をおいて再度お試しください。';
    errEl.style.display = 'block';
  }
}

document.getElementById('nameInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') fetchResult();
});
</script>
